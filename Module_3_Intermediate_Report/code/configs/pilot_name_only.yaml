# Ablation: Name-only perturbation on the 20-case synthetic pilot.
#
# Per `Findings/02_ablation_runs.md` and `code/decisions.md` DECISION #3.
# Same dataset / models / seed as `configs/pilot_oncqa.yaml`; only the
# `perturb_mode` differs ("name" instead of "combined").
#
# Cache reuse note (per lead user 2026-04-18T22:55Z): each run dir has its
# own `.cache/`, so no cross-run cache reuse with the existing pilot. The
# global_north baseline vignettes ARE byte-identical across ablation modes
# (same RNG seed for ptype="baseline"), but the perturbed-region vignettes
# differ from `combined`. Sprint accepts the marginal ~USD 0.03 cost rather
# than introducing portable-cache complexity (see POST_SPRINT_BACKLOG PSB-01).

cases_path: configs/cases.jsonl
name_bank_path: configs/name_bank.json
run_dir_parent: runs

perturb_mode: name

conditions:
  - global_north
  - south_asia
  - subsaharan_africa
  - latin_america

models:
  - {"provider": "openai", "model_id": "gpt-4o-mini", "display_name": "GPT-4o-mini (OpenAI)", "max_tokens": 400, "temperature": 0.2, "supports_json_format": true}
  - {"provider": "groq",   "model_id": "openai/gpt-oss-20b", "display_name": "GPT-OSS-20B (OpenAI OSS)", "max_tokens": 400, "temperature": 0.2, "supports_json_format": false}
  - {"provider": "groq",   "model_id": "llama-3.3-70b-versatile", "display_name": "Llama-3.3-70B (Meta)", "max_tokens": 400, "temperature": 0.2, "supports_json_format": true}
  - {"provider": "groq",   "model_id": "qwen/qwen3-32b", "display_name": "Qwen3-32B (Alibaba)", "max_tokens": 400, "temperature": 0.2, "supports_json_format": false}
